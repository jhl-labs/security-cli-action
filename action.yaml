name: Security CLI Action
description: Install security-cli from jhl-labs/dist and publish scan findings as GitHub Actions annotations.

inputs:
  token:
    description: GitHub token used by checkout and security-cli tool installation.
    required: false
    default: ${{ github.token }}
  checkout:
    description: Whether this action should checkout the repository before scanning.
    required: false
    default: "true"
  repository:
    description: Repository to checkout.
    required: false
    default: ${{ github.repository }}
  ref:
    description: Git ref to checkout.
    required: false
    default: ${{ github.ref }}
  fetch-depth:
    description: Checkout fetch depth. Use 0 when secret scanning needs Git history.
    required: false
    default: "0"
  version:
    description: security-cli version to install, such as v0.1.8. Use latest for the newest public release.
    required: false
    default: latest
  target:
    description: Path or artifact target passed to security-cli.
    required: false
    default: .
  command:
    description: security-cli command to run.
    required: false
    default: diagnose
  profile:
    description: security-cli profile.
    required: false
    default: ci
  output-dir:
    description: Directory where security-cli writes reports.
    required: false
    default: reports/security
  formats:
    description: Comma-separated security-cli output formats.
    required: false
    default: stdout,json,sarif
  install-tools:
    description: Install the default scanner toolchain before scanning.
    required: false
    default: "true"
  update-db:
    description: Update scanner vulnerability databases before scanning.
    required: false
    default: "false"
  annotation-limit:
    description: Maximum number of GitHub Actions annotations to emit.
    required: false
    default: "200"
  fail-on-findings:
    description: Return the security-cli exit code after annotations are emitted.
    required: false
    default: "true"
  usage-tracking:
    description: Send usage metrics to SE Actions Space. Requires SE_ACTIONS_API_KEY in the caller environment.
    required: false
    default: "true"
  usage-action-slug:
    description: Action slug registered in SE Actions Space for usage metrics.
    required: false
    default: security-cli-action
  se-actions-base-url:
    description: SE Actions Space base URL used for usage metrics.
    required: false
    default: https://actions.euno.work
  se-actions-origin-ip:
    description: Optional origin IP used to bypass an external proxy for usage metrics smoke tests.
    required: false
    default: ""
  extra-args:
    description: Extra arguments appended to the security-cli command.
    required: false
    default: ""

outputs:
  exit-code:
    description: security-cli exit code.
    value: ${{ steps.scan.outputs.exit-code }}
  duration-seconds:
    description: security-cli execution duration in seconds.
    value: ${{ steps.scan.outputs.duration-seconds }}
  report-dir:
    description: Directory containing security-cli reports.
    value: ${{ inputs.output-dir }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        token: ${{ inputs.token }}

    - name: Install security-cli
      shell: bash
      env:
        SECURITY_CLI_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        install_dir="${RUNNER_TEMP}/security-cli/bin"
        mkdir -p "${install_dir}"

        if [ "${SECURITY_CLI_VERSION}" = "latest" ] || [ -z "${SECURITY_CLI_VERSION}" ]; then
          curl -fsSL https://jhl-labs.github.io/security-cli/install.sh | INSTALL_DIR="${install_dir}" bash
        else
          curl -fsSL https://jhl-labs.github.io/security-cli/install.sh | INSTALL_DIR="${install_dir}" VERSION="${SECURITY_CLI_VERSION}" bash
        fi

        echo "${install_dir}" >> "${GITHUB_PATH}"
        "${install_dir}/security-cli" --version

    - name: Install scanner tools
      if: ${{ inputs.install-tools == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if security-cli tools install; then
            exit 0
          fi
          if [ "${attempt}" = "3" ]; then
            exit 1
          fi
          sleep_seconds=$((attempt * 10))
          echo "security-cli tools install failed; retrying in ${sleep_seconds}s"
          sleep "${sleep_seconds}"
        done

    - name: Update scanner databases
      if: ${{ inputs.update-db == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if security-cli tools update-db; then
            exit 0
          fi
          if [ "${attempt}" = "3" ]; then
            exit 1
          fi
          sleep_seconds=$((attempt * 10))
          echo "security-cli tools update-db failed; retrying in ${sleep_seconds}s"
          sleep "${sleep_seconds}"
        done

    - name: Set up annotation runtime
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Run security-cli
      id: scan
      shell: bash
      env:
        SECURITY_CLI_COMMAND: ${{ inputs.command }}
        SECURITY_CLI_TARGET: ${{ inputs.target }}
        SECURITY_CLI_PROFILE: ${{ inputs.profile }}
        SECURITY_CLI_OUTPUT_DIR: ${{ inputs.output-dir }}
        SECURITY_CLI_FORMATS: ${{ inputs.formats }}
        SECURITY_CLI_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set +e

        mkdir -p "${SECURITY_CLI_OUTPUT_DIR}"
        start_time=$(date +%s)

        format_args=()
        IFS=',' read -ra requested_formats <<< "${SECURITY_CLI_FORMATS}"
        for format in "${requested_formats[@]}"; do
          trimmed="$(echo "${format}" | xargs)"
          if [ -n "${trimmed}" ]; then
            format_args+=(--format "${trimmed}")
          fi
        done

        extra_args=()
        if [ -n "${SECURITY_CLI_EXTRA_ARGS}" ]; then
          read -r -a extra_args <<< "${SECURITY_CLI_EXTRA_ARGS}"
        fi

        security-cli "${SECURITY_CLI_COMMAND}" "${SECURITY_CLI_TARGET}" \
          --profile "${SECURITY_CLI_PROFILE}" \
          --output-dir "${SECURITY_CLI_OUTPUT_DIR}" \
          "${format_args[@]}" \
          "${extra_args[@]}"
        exit_code=$?
        end_time=$(date +%s)
        duration_seconds=$((end_time - start_time))

        echo "exit-code=${exit_code}" >> "${GITHUB_OUTPUT}"
        echo "duration-seconds=${duration_seconds}" >> "${GITHUB_OUTPUT}"
        exit 0

    - name: Track SE Actions usage
      if: ${{ always() && inputs.usage-tracking == 'true' }}
      shell: bash
      env:
        SE_ACTIONS_ACTION_SLUG: ${{ inputs.usage-action-slug }}
        SE_ACTIONS_BASE_URL: ${{ inputs.se-actions-base-url }}
        SE_ACTIONS_ORIGIN_IP: ${{ inputs.se-actions-origin-ip }}
        SECURITY_CLI_EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
        SECURITY_CLI_DURATION_SECONDS: ${{ steps.scan.outputs.duration-seconds }}
      run: |
        set +e

        if [ -z "${SE_ACTIONS_API_KEY:-}" ]; then
          echo "SE_ACTIONS_API_KEY is not set; skipping usage tracking."
          exit 0
        fi

        payload_file="${RUNNER_TEMP}/se-actions-usage.json"

        if ! node > "${payload_file}" <<'NODE'
        const baseUrl = (process.env.SE_ACTIONS_BASE_URL || 'https://actions.euno.work').replace(/\/+$/, '');
        const exitCode = process.env.SECURITY_CLI_EXIT_CODE || '1';
        const durationSeconds = Number.parseInt(process.env.SECURITY_CLI_DURATION_SECONDS || '0', 10);
        const ref = process.env.GITHUB_REF || '';

        let prNumber = null;
        const prMatch = ref.match(/^refs\/pull\/(\d+)\/merge$/);
        if (prMatch) {
          prNumber = Number.parseInt(prMatch[1], 10);
        }

        const payload = {
          actionSlug: process.env.SE_ACTIONS_ACTION_SLUG || 'security-cli-action',
          repository: process.env.GITHUB_REPOSITORY || '',
          workflow: process.env.GITHUB_WORKFLOW || '',
          runId: process.env.GITHUB_RUN_ID || '',
          actor: process.env.GITHUB_ACTOR || '',
          status: exitCode === '0' ? 'success' : 'failure',
          duration: Number.isFinite(durationSeconds) && durationSeconds > 0 ? durationSeconds * 1000 : 0,
          eventName: process.env.GITHUB_EVENT_NAME || '',
          ref,
          sha: process.env.GITHUB_SHA || '',
          baseRef: process.env.GITHUB_BASE_REF || '',
          headRef: process.env.GITHUB_HEAD_REF || '',
          prNumber,
          runnerOS: process.env.RUNNER_OS || '',
          runnerArch: process.env.RUNNER_ARCH || '',
          runnerVersion: process.env.ImageVersion || '',
          actionVersion: process.env.GITHUB_ACTION_REF || '',
          jobName: process.env.GITHUB_JOB || '',
          stepName: process.env.GITHUB_ACTION || '',
        };

        console.log(JSON.stringify(payload));
        NODE
        then
          echo "Warning: failed to build SE Actions usage payload (non-critical)."
          exit 0
        fi

        curl_args=(
          --silent
          --show-error
          --fail-with-body
          --request POST
          --header "Content-Type: application/json"
          --header "x-api-key: ${SE_ACTIONS_API_KEY}"
          --data @"${payload_file}"
        )

        track_url="${SE_ACTIONS_BASE_URL%/}/api/analytics/track"
        if [ -n "${SE_ACTIONS_ORIGIN_IP:-}" ]; then
          track_url="http://actions.euno.work/api/analytics/track"
          curl_args+=(--resolve "actions.euno.work:80:${SE_ACTIONS_ORIGIN_IP}")
        fi

        if curl "${curl_args[@]}" "${track_url}" > /dev/null; then
          echo "Usage tracked for action: ${SE_ACTIONS_ACTION_SLUG}"
        else
          echo "Warning: failed to track SE Actions usage (non-critical)."
        fi

        exit 0

    - name: Ensure SARIF report exists
      shell: bash
      env:
        SECURITY_CLI_OUTPUT_DIR: ${{ inputs.output-dir }}
        SECURITY_CLI_FORMATS: ${{ inputs.formats }}
      run: |
        set -euo pipefail

        requested_sarif=false
        IFS=',' read -ra requested_formats <<< "${SECURITY_CLI_FORMATS}"
        for format in "${requested_formats[@]}"; do
          trimmed="$(echo "${format}" | xargs | tr '[:upper:]' '[:lower:]')"
          if [ "${trimmed}" = "sarif" ]; then
            requested_sarif=true
          fi
        done

        if [ "${requested_sarif}" != "true" ]; then
          exit 0
        fi

        mkdir -p "${SECURITY_CLI_OUTPUT_DIR}"
        if find "${SECURITY_CLI_OUTPUT_DIR}" -type f -name '*.sarif' | grep -q .; then
          exit 0
        fi

        node > "${SECURITY_CLI_OUTPUT_DIR}/security-report.sarif" <<'NODE'
        const report = {
          version: '2.1.0',
          $schema: 'https://json.schemastore.org/sarif-2.1.0.json',
          runs: [
            {
              tool: {
                driver: {
                  name: 'security-cli',
                  informationUri: 'https://github.com/jhl-labs/security-cli',
                  rules: [],
                },
              },
              results: [],
            },
          ],
        };

        process.stdout.write(`${JSON.stringify(report, null, 2)}\n`);
        NODE

    - name: Publish GitHub annotations
      shell: bash
      env:
        SECURITY_CLI_OUTPUT_DIR: ${{ inputs.output-dir }}
        ANNOTATION_LIMIT: ${{ inputs.annotation-limit }}
      run: |
        set -euo pipefail

        node <<'NODE'
        const fs = require('fs');
        const path = require('path');

        const reportDir = process.env.SECURITY_CLI_OUTPUT_DIR || 'reports/security';
        const limit = Number.parseInt(process.env.ANNOTATION_LIMIT || '200', 10);

        function walk(dir) {
          if (!fs.existsSync(dir)) {
            return [];
          }
          return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
            const fullPath = path.join(dir, entry.name);
            return entry.isDirectory() ? walk(fullPath) : [fullPath];
          });
        }

        function escapeCommand(value) {
          return String(value ?? '')
            .replace(/%/g, '%25')
            .replace(/\r/g, '%0D')
            .replace(/\n/g, '%0A');
        }

        function severityFromValue(value) {
          const numeric = Number(value);
          if (Number.isFinite(numeric)) {
            if (numeric >= 9) return 'critical';
            if (numeric >= 7) return 'high';
            if (numeric >= 4) return 'medium';
            if (numeric > 0) return 'low';
          }

          const text = String(value ?? '').toLowerCase();
          if (/\bcritical\b|\bcrit\b/.test(text)) return 'critical';
          if (/\bhigh\b/.test(text)) return 'high';
          if (/\bmedium\b|\bmoderate\b/.test(text)) return 'medium';
          if (/\blow\b/.test(text)) return 'low';
          return null;
        }

        function severityFromResult(result, rule) {
          const properties = result.properties || {};
          const ruleProperties = rule?.properties || {};
          const explicitSeverity = [
            ruleProperties.severity,
            ruleProperties.securitySeverity,
            ruleProperties['security-severity'],
            properties.severity,
            properties.securitySeverity,
            properties['security-severity'],
            properties.problem?.severity,
            ...(Array.isArray(properties.tags) ? properties.tags : []),
          ]
            .map(severityFromValue)
            .find(Boolean);

          if (explicitSeverity) return explicitSeverity;

          const rawSeverity = [result.ruleId, result.message?.text]
            .filter(Boolean)
            .join(' ')
            .toLowerCase();

          if (/\bcritical\b|\bcrit\b/.test(rawSeverity)) return 'critical';
          if (/\bhigh\b/.test(rawSeverity)) return 'high';
          if (/\bmedium\b|\bmoderate\b/.test(rawSeverity)) return 'medium';
          if (/\blow\b/.test(rawSeverity)) return 'low';
          if (result.level === 'error') return 'high';
          if (result.level === 'warning') return 'medium';
          return 'low';
        }

        function commandLevel(severity) {
          if (severity === 'critical' || severity === 'high') return 'error';
          if (severity === 'medium') return 'warning';
          return 'notice';
        }

        function firstLocation(result) {
          const location = result.locations?.[0]?.physicalLocation || {};
          const region = location.region || {};
          return {
            file: location.artifactLocation?.uri || 'security-cli',
            line: region.startLine || 1,
            endLine: region.endLine || region.startLine || 1,
            col: region.startColumn,
            endColumn: region.endColumn,
          };
        }

        const sarifFiles = walk(reportDir).filter((file) => file.endsWith('.sarif'));
        let emitted = 0;

        for (const file of sarifFiles) {
          const sarif = JSON.parse(fs.readFileSync(file, 'utf8'));
          for (const run of sarif.runs || []) {
            const rules = new Map(
              (run.tool?.driver?.rules || []).map((rule) => [rule.id, rule])
            );

            for (const result of run.results || []) {
              if (emitted >= limit) break;

              const rule = rules.get(result.ruleId) || {};
              const severity = severityFromResult(result, rule);
              const level = commandLevel(severity);
              const location = firstLocation(result);
              const title = `${severity.toUpperCase()}: ${
                rule.name || rule.shortDescription?.text || result.ruleId || 'security finding'
              }`;
              const message = result.message?.text || rule.fullDescription?.text || title;

              const props = [
                `file=${escapeCommand(location.file)}`,
                `line=${location.line}`,
                `endLine=${location.endLine}`,
                `title=${escapeCommand(title)}`,
              ];

              if (location.col) props.push(`col=${location.col}`);
              if (location.endColumn) props.push(`endColumn=${location.endColumn}`);

              console.log(`::${level} ${props.join(',')}::${escapeCommand(message)}`);
              emitted += 1;
            }
          }
        }

        if (emitted === 0) {
          console.log('No SARIF annotations emitted.');
        } else {
          console.log(`Emitted ${emitted} security annotations.`);
        }
        NODE

    - name: Enforce security-cli result
      if: ${{ inputs.fail-on-findings == 'true' && steps.scan.outputs.exit-code != '0' }}
      shell: bash
      run: |
        echo "security-cli exited with code ${{ steps.scan.outputs.exit-code }}"
        exit "${{ steps.scan.outputs.exit-code }}"
